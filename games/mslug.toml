[game]
name = "Metal Slug - Super Vehicle-001"
short_name = "mslug"
year = 1996
discovery_files = []

[program]
address_space = "m68k"
fixed_base = 0x000000
fixed_size = 0x100000
bank_window_base = 0x200000
bank_window_size = 0x100000

[functions]
entry = []
# BIOS-backed smoke can dispatch to cart-side entry points outside the static
# cart reset entry: the VBlank vector handler, the cartridge header start
# trampoline, and an init callback reached after BIOS helper expansion.
extra = [0x0008F6, 0x000122, 0x001F84]

[dispatch]
# Callback target is loaded from RAM through A6 and dispatched via JSR (A0).
# The additional sites are reached after seeding the VBlank handler and are
# intentionally left as runtime-computed dispatch boundaries for now.
runtime = [0x0006C8, 0x001F3C, 0x05BF8A]
